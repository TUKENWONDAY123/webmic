<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WebMic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #06080c;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      color: #ffffff;
      background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 13px;
      color: #475569;
      margin-bottom: 40px;
      font-weight: 500;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      margin-bottom: 32px;
      font-size: 11px;
      font-weight: 500;
      color: #94a3b8;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #475569;
    }
    .status-dot.connected { background: #10b981; }
    .status-dot.streaming { background: #10b981; animation: pulse 1.5s infinite; }
    .status-dot.error { background: #ef4444; }
    .status-dot.waiting { background: #f59e0b; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .pairing-container {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }
    .code-input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
      color: #ffffff;
      font-size: 26px;
      text-align: center;
      font-weight: 700;
      letter-spacing: 6px;
      outline: none;
      transition: all 0.3s ease;
    }
    .code-input::placeholder {
      color: #1e293b;
      letter-spacing: 6px;
    }
    .code-input:focus {
      border-color: rgba(16, 185, 129, 0.4);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
    }

    .btn-start {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #10b981;
      color: #042f2e;
      transition: all 0.2s ease;
    }
    .btn-start:active {
      transform: scale(0.98);
    }
    .btn-start:hover {
      background: #34d399;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
    }
    .btn-start:disabled {
      background: #1e293b;
      color: #475569;
      cursor: not-allowed;
    }

    /* Streaming UI */
    .streaming-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }
    .mic-button-wrapper {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mic-glow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.08);
      transform: scale(1);
      transition: transform 0.05s ease, box-shadow 0.05s ease;
      z-index: 1;
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.15);
    }
    .btn-mic {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #10b981;
      color: #042f2e;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px -5px rgba(16, 185, 129, 0.4);
    }
    .btn-mic:active {
      transform: scale(0.95);
    }
    .btn-mic.muted {
      background: #ef4444;
      color: #ffffff;
      box-shadow: 0 10px 30px -5px rgba(239, 68, 68, 0.4);
    }
    .btn-disconnect {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #475569;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }
    .btn-disconnect:hover {
      border-color: rgba(23ef, 68, 68, 0.3);
      color: #ef4444;
      background: rgba(239, 68, 68, 0.04);
    }

    .info {
      width: 100%;
      max-width: 260px;
      font-size: 11px;
      color: #334155;
      text-align: center;
      line-height: 1.6;
      margin-top: 8px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1>WebMic</h1>
  <p class="subtitle">Wireless Microphone</p>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Ready to connect</span>
  </div>

  <!-- Pairing UI (Default) -->
  <div class="pairing-container" id="pairing-ui">
    <input type="tel" id="code-input" class="code-input" placeholder="000000" maxlength="6" autocomplete="off" />
    <button class="btn-start" id="start-btn">Connect & Stream</button>
  </div>

  <!-- Streaming UI (Hidden Initially) -->
  <div class="streaming-container hidden" id="streaming-ui">
    <div class="mic-button-wrapper">
      <div class="mic-glow" id="mic-glow"></div>
      <button class="btn-mic" id="mic-btn">
        <!-- SVG Mic Icon -->
        <svg viewBox="0 0 24 24" width="42" height="42" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" id="mic-svg-active">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
        <!-- SVG Mic Mute Icon -->
        <svg viewBox="0 0 24 24" width="42" height="42" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" id="mic-svg-muted" class="hidden">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>
          <path d="M17 11a6.9 6.9 0 0 1-2.5 5.5"></path>
          <path d="M5 10v1a7 7 0 0 0 7 7"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
    </div>
    <button class="btn-disconnect" id="disconnect-btn">Disconnect</button>
  </div>

  <div class="info" id="info-text">
    Enter the 6-digit code shown on your PC to connect.
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="phone.js"></script>
</body>
</html>
